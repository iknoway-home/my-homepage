<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iKnoWay - Fantasy Book</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=IM+Fell+English:ital@0;1&family=Noto+Serif+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="../../shared/human-polish.css" />
</head>
<body>
  <div class="ambient" aria-hidden="true"></div>

  <header class="book-header">
    <a class="sigil" href="#cover" aria-label="Open cover">IK</a>
    <nav class="chapter-nav" aria-label="Chapters">
      <button type="button" data-page="0">Cover</button>
      <button type="button" data-page="1">Profile</button>
      <button type="button" data-page="2">Games</button>
      <button type="button" data-page="3">Anime</button>
      <button type="button" data-page="6">Movies</button>
      <button type="button" data-page="8">Projects</button>
      <button type="button" data-page="9">Fortune</button>
      <button type="button" data-page="10">Contact</button>
    </nav>
    <a class="theme-switch" href="../../index.html?switch=1">Switch Theme</a>
  </header>

  <main class="library-shell" aria-live="polite">
    <div class="book-stage">
      <div class="book" id="book">
        <div class="book-spine" aria-hidden="true"></div>
        <section class="spread is-active" id="cover" data-chapter="Cover">
          <article class="page page-left cover-page">
            <p class="folio">The Arcane Register</p>
            <div class="cover-emblem" aria-hidden="true">
              <span></span>
            </div>
            <h1 id="hero-name"></h1>
            <p class="cover-role" id="hero-role"></p>
          </article>
          <article class="page page-right cover-page">
            <p class="chapter-kicker">A personal grimoire</p>
            <p class="cover-copy" id="hero-tagline"></p>
            <div class="hero-stats" id="hero-stats"></div>
            <button class="turn-cta" type="button" data-action="next">Begin Reading</button>
          </article>
        </section>
      </div>

      <div class="turn-sheet turn-sheet-next" id="turn-next" aria-hidden="true"></div>
      <div class="turn-sheet turn-sheet-prev" id="turn-prev" aria-hidden="true"></div>
    </div>

    <button class="page-control page-control-prev" type="button" data-action="prev" aria-label="Previous page">
      <span aria-hidden="true">‹</span>
    </button>
    <button class="page-control page-control-next" type="button" data-action="next" aria-label="Next page">
      <span aria-hidden="true">›</span>
    </button>
  </main>

  <footer class="book-footer">
    <p id="page-indicator">Page 1</p>
    <p>Wheel / PageUp / PageDown</p>
  </footer>

  <script src="../../shared/utils.js"></script>
  <script src="../../shared/data.js"></script>
  <script src="script.js"></script>
</body>
</html>
