<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iKnoWay - kawaii</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header class="site-header" id="site-header">
    <nav class="nav-inner">
      <span class="nav-logo">iKnoWay</span>
      <ul class="nav-links">
        <li><a href="#about">About</a></li>
        <li><a href="#anime">Anime</a></li>
        <li><a href="#movies">Movies</a></li>
        <li><a href="#contact">Contact</a></li>
      </ul>
      <a href="../../index.html?switch=1" class="nav-switch">Gacha!</a>
    </nav>
  </header>

  <section class="hero" id="top">
    <div class="hero-content reveal">
      <div class="hero-sparkle" aria-hidden="true">&#10024;</div>
      <h1 class="hero-name" id="hero-name"></h1>
      <p class="hero-role" id="hero-role"></p>
      <div class="hero-divider"></div>
      <p class="hero-tagline" id="hero-tagline"></p>
      <a href="#anime" class="btn-kawaii">My Favorites!</a>
    </div>
  </section>

  <section class="section" id="about">
    <div class="container">
      <span class="section-badge reveal">About Me</span>
      <h2 class="section-title reveal">Nice to meet you!</h2>
      <div class="about-card reveal">
        <div id="about-paragraphs"></div>
        <div class="facts-pills" id="about-facts"></div>
        <div class="traits-row" id="about-traits"></div>
      </div>
    </div>
  </section>

  <section class="section" id="anime">
    <div class="container">
      <span class="section-badge reveal">Anime</span>
      <h2 class="section-title reveal">My Fav Anime!</h2>
      <p class="section-sub reveal">These make me super happy~</p>
      <div class="works-grid" id="anime-grid"></div>
    </div>
  </section>

  <section class="section" id="movies">
    <div class="container">
      <span class="section-badge reveal">Movies</span>
      <h2 class="section-title reveal">Best Movies!</h2>
      <p class="section-sub reveal">Absolutely love these~</p>
      <div class="works-grid" id="movies-grid"></div>
    </div>
  </section>

  <section class="section" id="contact">
    <div class="container">
      <span class="section-badge reveal">Contact</span>
      <h2 class="section-title reveal">Let's be friends!</h2>
      <div class="contact-center reveal">
        <p class="contact-msg" id="contact-message"></p>
        <div class="social-links" id="contact-social"></div>
      </div>
    </div>
    <footer class="site-footer">
      <p>&copy; 2026 iKnoWay</p>
      <a href="../../index.html?switch=1" class="footer-switch">Theme Gacha!</a>
    </footer>
  </section>

  <script src="../../shared/utils.js"></script>
  <script src="../../shared/data.js"></script>
  <script src="../../shared/snap.js"></script>
  <script src="script.js"></script>
</body>
</html>
